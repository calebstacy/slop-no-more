name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-dogfood:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e . pytest
      - run: pytest -q
      # The gate gates itself: exit code = high-severity findings in our own docs.
      - run: slop scan README.md SKILL.md examples/side-by-side.md
